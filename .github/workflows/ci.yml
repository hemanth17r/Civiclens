name: CivicLens CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Build Project
      run: npm run build
      env:
        # Dummy variables to satisfy SDK initialization during build
        NEXT_PUBLIC_FIREBASE_API_KEY: "dummy-key"
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "dummy.firebaseapp.com"
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: "dummy-project"
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "dummy-project.appspot.com"
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
        NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:dummy"
        NEXT_PUBLIC_SUPABASE_URL: "https://dummy.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy-key"
        FIREBASE_SERVICE_ACCOUNT_KEY: "{}" 
